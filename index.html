<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Trainstation Add Friends Network</title>


<link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">

<style>

body{
background:#111;
color:#eee;
font-family:Arial;
margin:0;
}

/* header image */
.header{
width:100%;
max-height:220px;
object-fit:cover;
}

/* top bar */
.topbar{
display:flex;
align-items:center;
justify-content:center;
gap:30px;
padding:12px;
}

/* search box */
input{
background:#222;
color:#eee;
border:1px solid #444;
padding:8px 12px;
width:240px;
font-size:15px;
}

/* info text */
.info{
font-size:15px;
font-weight: bold;
color:#bbb;
display:flex;
align-items:center;
gap:6px;
}

.icon{
font-size:16px;
}

/* table */
#table{
height:calc(100vh - 280px);
font-size:15px;
}

/* header row */
.tabulator-header{
position:sticky !important;
top:0;
z-index:999;
font-size:19px;
font-weight:600;
}

/* higher rows */
.tabulator-row{
min-height:30px;
}

/* all cells vertical center */
.tabulator-cell{
padding-top:10px;
padding-bottom:10px;
}

.tabulator-cell > div{
width:100%;
display:flex;
align-items:center;
}

/* facebook links */
a{
color:#7cc7ff;
text-decoration:none;
font-weight:400;
}

a:hover{
color:#a8ddff;
text-decoration:underline;
}

/* Pixel Portal Name */
.tabulator-cell.portalCol{
font-family:'Roboto Mono', monospace !important;
font-weight:700 !important;
font-size:16px;
color:#ffffff;
}

/* Status centered */
.statusCol{
justify-content:center;
}

/* mobile */
@media (max-width:900px){

.tabulator{
font-size:14px;
}

.tabulator-row{
min-height:44px;
}

.topbar{
flex-direction:column;
gap:6px;
}

.header{
max-height:140px;
}

}

</style>

</head>

<body>

<img src="header.jpg" class="header">

<div class="topbar">

<input id="search" placeholder="Search...">

<div class="info">
<span class="icon">📋</span>
One-Click-Copy "Pixel Portal Name"
</div>

</div>

<div id="table"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1cZNXQHDezV_W0maz0ufxbL1nVJfchSKNjlgDucwbtig/export?format=xlsx";
let table;

function loadData() {
    fetch(sheetURL)
    .then(res => res.arrayBuffer())
    .then(data => {
        const workbook = XLSX.read(data, {cellLinks: true});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        
        // Wir wandeln das Sheet in ein Array von Arrays um, um die Links präzise zu extrahieren
        const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
        const headers = rows[0];
        const jsonData = [];

        // Wir gehen jede Zeile durch und verheiraten Text mit dem versteckten Link
        for (let r = 1; r < rows.length; r++) {
            let rowObj = {};
            headers.forEach((header, c) => {
                rowObj[header] = rows[r][c];
                
                // Nur für Spalte B (Index 1): Link extrahieren
                if (c === 1) {
                    const cellAddr = XLSX.utils.encode_cell({r: r, c: c});
                    const cell = sheet[cellAddr];
                    rowObj["fb_link"] = (cell && cell.l && cell.l.Target) ? cell.l.Target : "";
                }
            });
            jsonData.push(rowObj);
        }

        const columns = [
            { title: headers[0], field: headers[0], cssClass: "statusCol", hozAlign: "center", frozen: true },
            { 
                title: headers[1], 
                field: headers[1], 
                frozen: true,
                formatter: function(cell) {
                    const name = cell.getValue();
                    const link = cell.getData().fb_link; // Wir holen den Link aus unserem neuen Feld
                    
                    if (!name) return "";
                    
                    // Wenn ein Link existiert, nutzen wir ihn, sonst Fallback zur Suche
                    const url = link ? link : "https://www.facebook.com" + encodeURIComponent(name);
                    return `<a href="${url}" target="_blank">${name}</a>`;
                }
            },
            { 
                title: headers[2], 
                field: headers[2], 
                cssClass: "portalCol", 
                frozen: true,
                cellClick: (e, cell) => navigator.clipboard.writeText(cell.getValue())
            }
        ];

        // Restliche Spalten
        headers.slice(3).forEach(col => columns.push({ title: col, field: col }));

        if (!table) {
            table = new Tabulator("#table", { data: jsonData, columns: columns, layout: "fitDataStretch" });
        } else {
            table.replaceData(jsonData);
        }
    });
}



loadData();

// Suche
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    table.setFilter(data =>
        Object.values(data).some(v => String(v).toLowerCase().includes(value))
    );
});



</script>

</body>

</html>
