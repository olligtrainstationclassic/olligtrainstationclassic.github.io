<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Trainstation Tabelle</title>

<link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

<style>

body{
    background:#111;
    color:#eee;
    font-family:Arial;
    padding:20px;
}

/* Bild */
.header-img{
    max-width:100%;
    margin-bottom:15px;
}

/* Suche */
input{
    background:#222;
    color:#eee;
    border:1px solid #444;
    padding:6px;
    margin-bottom:10px;
    width:250px;
}

/* Kopf fixieren */
.tabulator{
    height:85vh;
}

.tabulator-header{
    position:sticky !important;
    top:0;
    z-index:100;
}

</style>

</head>

<body>

<img class="header-img" src="header.png">

<br>

<input id="search" placeholder="Suche...">

<div id="table"></div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1cZNXQHDezV_W0maz0ufxbL1nVJfchSKNjlgDucwbtig/export?format=xlsx";

let table;

function loadData(){

fetch(sheetURL)
.then(res => res.arrayBuffer())
.then(data => {

    const workbook = XLSX.read(data);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    const json = XLSX.utils.sheet_to_json(sheet,{
        defval:"",
        raw:false
    });

    const cols = Object.keys(json[0]).map((col,i)=>{

        // Spalte B Facebook Links klickbar
        if(i==1){
            return {
                title:col,
                field:col,
                formatter:function(cell){

                    let url = cell.getValue();

                    if(!url) return "";

                    if(!url.startsWith("http"))
                        url = "https://"+url;

                    return "<a href='"+url+"' target='_blank'>Profil öffnen</a>";
                }
            }
        }

        // Spalte C klick kopiert
        if(i==2){
            return {
                title:col,
                field:col,

                cellClick:function(e,cell){

                    navigator.clipboard.writeText(cell.getValue());

                }
            }
        }

        return {
            title:col,
            field:col
        }

    });


    if(!table){

        table = new Tabulator("#table",{

            data:json,

            layout:"fitDataStretch",

            movableColumns:true,

            columns:cols

        });

    }else{

        table.replaceData(json);

    }

});

}

loadData();

// globale Suche
document.getElementById("search").addEventListener("keyup",function(){

    const value = this.value.toLowerCase();

    table.setFilter(function(data){

        return Object.values(data).some(v =>
            String(v).toLowerCase().includes(value)
        );

    });

});

</script>

</body>
</html>
