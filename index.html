<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Trainstation Tabelle</title>

<link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

<style>

body{
    background:#111;
    color:#eee;
    font-family:Arial;
    margin:0;
}

/* Header Bild */
.header{
    width:100%;
    max-height:220px;
    object-fit:cover;
}

/* Suchfeld */
.searchBox{
    padding:10px;
}

input{
    background:#222;
    color:#eee;
    border:1px solid #444;
    padding:6px;
    width:250px;
}

/* Tabelle */
#table{
    height:calc(100vh - 280px);
}

/* Kopfzeile fix */
.tabulator-header{
    position:sticky !important;
    top:0;
    z-index:999;
}

</style>

</head>

<body>

<img src="header.jpg" class="header">

<div class="searchBox">
<input id="search" placeholder="Suche...">
</div>

<div id="table"></div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1cZNXQHDezV_W0maz0ufxbL1nVJfchSKNjlgDucwbtig/export?format=xlsx";

let table;

function loadData(){

fetch(sheetURL)
.then(res => res.arrayBuffer())
.then(data => {

    const workbook = XLSX.read(data);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    const json = XLSX.utils.sheet_to_json(sheet,{
        defval:"",
        raw:false
    });

    const cols = Object.keys(json[0]).map((col,i)=>{

        // Spalte B Facebook
        if(i==1){

            return {

                title:col,
                field:col,

                formatter:function(cell){

                    let text = cell.getValue();

                    if(!text) return "";

                    // falls nur Name vorhanden → Facebook Suche
                    let url =
                    "https://www.facebook.com/search/top?q="
                    + encodeURIComponent(text);

                    return "<a href='"+url+"' target='_blank'>"+text+"</a>";

                }

            }

        }

        // Spalte C kopieren
        if(i==2){

            return {

                title:col,
                field:col,

                cellClick:function(e,cell){

                    navigator.clipboard.writeText(cell.getValue());

                }

            }

        }

        return {
            title:col,
            field:col
        }

    });

    if(!table){

        table = new Tabulator("#table",{

            data:json,

            layout:"fitDataStretch",

            columns:cols

        });

    }else{

        table.replaceData(json);

    }

});

}

loadData();


// globale Suche
document.getElementById("search").addEventListener("keyup",function(){

    const value = this.value.toLowerCase();

    table.setFilter(function(data){

        return Object.values(data).some(v =>
            String(v).toLowerCase().includes(value)
        );

    });

});

</script>

</body>
</html>
