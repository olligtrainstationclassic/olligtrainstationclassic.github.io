<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trainstation Friends</title>

<link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">

<style>

body{
    background:#111;
    color:#eee;
    font-family:Arial;
    margin:0;
}

/* header */
.header{
    width:100%;
    max-height:220px;
    object-fit:cover;
}

/* top area */
.topbar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:30px;
    padding:12px;
}

/* search */
input{
    background:#222;
    color:#eee;
    border:1px solid #444;
    padding:8px 12px;
    width:240px;
    font-size:15px;
}

/* info text */
.info{
    font-size:14px;
    color:#bbb;
    display:flex;
    align-items:center;
    gap:6px;
}

.icon{
    font-size:16px;
}

/* table */
#table{
    height:calc(100vh - 280px);
    font-size:15px;
}

/* header row */
.tabulator-header{
    position:sticky !important;
    top:0;
    z-index:999;
    font-size:18px;
    font-weight:600;
}

/* rows */
.tabulator-row{
    min-height:48px;
}

/* all cells vertical center */
.tabulator-cell{
    display:flex;
    align-items:center;
}

/* facebook links */
a{
    color:#7cc7ff;
    text-decoration:none;
    font-weight:400;
}

a:hover{
    color:#a8ddff;
    text-decoration:underline;
}

/* Pixel Portal Name style (Spalte C) */
.tabulator-cell:nth-child(3){
    font-family:'Roboto Mono', monospace;
    font-weight:700;
    font-size:16px;
    color:#ffd166;
}

/* Status zentriert */
.tabulator-cell:nth-child(1){
    justify-content:center;
}

/* mobile */
@media (max-width: 900px){

.tabulator{
    font-size:14px;
}

.tabulator-row{
    min-height:44px;
}

.topbar{
    flex-direction:column;
    gap:6px;
}

.header{
    max-height:140px;
}

}

</style>

</head>

<body>

<img src="header.jpg" class="header">

<div class="topbar">

<input id="search" placeholder="Search...">

<div class="info">
<span class="icon">📋</span>
One-Click-Copy "Pixel Portal Name"
</div>

</div>

<div id="table"></div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1cZNXQHDezV_W0maz0ufxbL1nVJfchSKNjlgDucwbtig/export?format=xlsx";

let table;

function isURL(text){
    return text.startsWith("http://") || text.startsWith("https://");
}

function loadData(){

fetch(sheetURL)
.then(res => res.arrayBuffer())
.then(data => {

    const workbook = XLSX.read(data);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    const json = XLSX.utils.sheet_to_json(sheet,{
        defval:"",
        raw:false
    });

    const cols = Object.keys(json[0]).map((col,i)=>{

        /* Status */
        if(i==0){
            return {
                title:col,
                field:col,
                frozen:true
            }
        }

        /* Facebook */
        if(i==1){

            return {

                title:col,
                field:col,
                frozen:true,

                formatter:function(cell){

                    let value = cell.getValue();

                    if(!value) return "";

                    let url;
                    let text;

                    if(isURL(value)){

                        url = value;

                        try{
                            let u = new URL(value);
                            text = u.pathname.replace(/\//g,"");

                            if(text.length < 3)
                                text = value;

                        }catch{
                            text = value;
                        }

                    }
                    else{

                        url =
                        "https://www.facebook.com/search/top?q="
                        + encodeURIComponent(value);

                        text = value;

                    }

                    return "<a href='"+url+"' target='_blank'>"+text+"</a>";

                }

            }

        }

        /* Pixel Portal copy */
        if(i==2){

            return {

                title:col,
                field:col,
                frozen:true,

                cellClick:function(e,cell){

                    navigator.clipboard.writeText(cell.getValue());

                }

            }

        }

        return {
            title:col,
            field:col
        }

    });

    if(!table){

        table = new Tabulator("#table",{

            data:json,

            layout:"fitDataStretch",

            movableColumns:true,

            columns:cols

        });

    }else{

        table.replaceData(json);

    }

});

}

loadData();

/* global search */

document.getElementById("search").addEventListener("keyup",function(){

    const value = this.value.toLowerCase();

    table.setFilter(function(data){

        return Object.values(data).some(v =>
            String(v).toLowerCase().includes(value)
        );

    });

});

</script>

</body>
</html>
