<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trainstation Friends</title>

<link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

<style>

body{
    background:#111;
    color:#eee;
    font-family:Arial;
    margin:0;
}

/* header image */
.header{
    width:100%;
    max-height:220px;
    object-fit:cover;
}

/* top area */
.topbar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:30px;
    padding:10px;
}

/* search */
input{
    background:#222;
    color:#eee;
    border:1px solid #444;
    padding:6px 10px;
    width:220px;
}

/* info text */
.info{
    font-size:14px;
    color:#bbb;
    display:flex;
    align-items:center;
    gap:6px;
}

/* icon */
.icon{
    font-size:16px;
}

/* table height */
#table{
    height:calc(100vh - 280px);
}

/* sticky header */
.tabulator-header{
    position:sticky !important;
    top:0;
    z-index:999;
}

/* facebook links */
a{
    color:#7cc7ff;
    text-decoration:none;
    font-weight:500;
}

a:hover{
    color:#a8ddff;
    text-decoration:underline;
}

/* Pixel Portal Name hervorheben */
.tabulator-cell:nth-child(3){
    color:#ffd166;
    font-weight:600;
}

/* mobile optimisation */
@media (max-width: 900px){

.tabulator{
    font-size:14px;
}

.tabulator-row{
    min-height:42px;
}

.topbar{
    flex-direction:column;
    gap:6px;
}

.header{
    max-height:140px;
}

}

</style>

</head>

<body>

<img src="header.jpg" class="header">

<div class="topbar">

<input id="search" placeholder="Search...">

<div class="info">
<span class="icon">📋</span>
One-Click-Copy "Pixel Portal Name"
</div>

</div>

<div id="table"></div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1cZNXQHDezV_W0maz0ufxbL1nVJfchSKNjlgDucwbtig/export?format=xlsx";

let table;

function loadData(){

fetch(sheetURL)
.then(res => res.arrayBuffer())
.then(data => {

    const workbook = XLSX.read(data);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    const json = XLSX.utils.sheet_to_json(sheet,{
        defval:"",
        raw:false
    });

    const cols = Object.keys(json[0]).map((col,i)=>{

        /* Status */
        if(i==0){
            return {
                title:col,
                field:col,
                frozen:true
            }
        }

        /* Facebook */
        if(i==1){

            return {

                title:col,
                field:col,
                frozen:true,

                formatter:function(cell){

                    let text = cell.getValue();

                    if(!text) return "";

                    let url =
                    "https://www.facebook.com/search/top?q="
                    + encodeURIComponent(text);

                    return "<a href='"+url+"' target='_blank'>"+text+"</a>";

                }

            }

        }

        /* Pixel Portal copy */
        if(i==2){

            return {

                title:col,
                field:col,
                frozen:true,

                cellClick:function(e,cell){

                    navigator.clipboard.writeText(cell.getValue());

                }

            }

        }

        return {
            title:col,
            field:col
        }

    });

    if(!table){

        table = new Tabulator("#table",{

            data:json,

            layout:"fitDataStretch",

            movableColumns:true,

            columns:cols

        });

    }else{

        table.replaceData(json);

    }

});

}

loadData();

/* global search */

document.getElementById("search").addEventListener("keyup",function(){

    const value = this.value.toLowerCase();

    table.setFilter(function(data){

        return Object.values(data).some(v =>
            String(v).toLowerCase().includes(value)
        );

    });

});

</script>

</body>
</html>
