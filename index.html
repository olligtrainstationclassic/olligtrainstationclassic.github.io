<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Trainstation Add Friends Network</title>

<link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">

<style>

body{
background:#111;
color:#eee;
font-family:Arial;
margin:0;
}

/* header image */
.header{
width:100%;
max-height:220px;
object-fit:cover;
}

/* top bar */
.topbar{
display:flex;
align-items:center;
justify-content:center;
gap:30px;
padding:12px;
}

/* search box */
input{
background:#222;
color:#eee;
border:1px solid #444;
padding:8px 12px;
width:240px;
font-size:15px;
}

/* info text */
.info{
font-size:14px;
color:#bbb;
display:flex;
align-items:center;
gap:6px;
}

.icon{
font-size:16px;
}

/* table */
#table{
height:calc(100vh - 280px);
font-size:15px;
}

/* header row */
.tabulator-header{
position:sticky !important;
top:0;
z-index:999;
font-size:19px;
font-weight:600;
}

/* higher rows */
.tabulator-row{
min-height:48px;
}

/* all cells vertical center */
.tabulator-cell{
padding-top:10px;
padding-bottom:10px;
}

.tabulator-cell > div{
width:100%;
display:flex;
align-items:center;
}

/* facebook links */
a{
color:#7cc7ff;
text-decoration:none;
font-weight:400;
}

a:hover{
color:#a8ddff;
text-decoration:underline;
}

/* Pixel Portal Name */
.tabulator-cell.portalCol{
font-family:'Roboto Mono', monospace !important;
font-weight:700 !important;
font-size:16px;
color:#ffffff;
}

/* Status centered */
.statusCol{
justify-content:center;
}

/* mobile */
@media (max-width:900px){

.tabulator{
font-size:14px;
}

.tabulator-row{
min-height:44px;
}

.topbar{
flex-direction:column;
gap:6px;
}

.header{
max-height:140px;
}

}

</style>

</head>

<body>

<img src="header.jpg" class="header">

<div class="topbar">

<input id="search" placeholder="Search...">

<div class="info">
<span class="icon">📋</span>
One-Click-Copy "Pixel Portal Name"
</div>

</div>

<div id="table"></div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1cZNXQHDezV_W0maz0ufxbL1nVJfchSKNjlgDucwbtig/export?format=xlsx";

let table;

/* prüft ob Text bereits ein echter Link ist */
function isURL(text){

if(!text) return false;

text = text.trim();

return text.startsWith("http://") ||
       text.startsWith("https://") ||
       text.startsWith("www.facebook.com");

}

function loadData(){

fetch(sheetURL)

.then(res => res.arrayBuffer())

.then(data => {

const workbook = XLSX.read(data);

const sheet = workbook.Sheets[workbook.SheetNames[0]];

const json = XLSX.utils.sheet_to_json(sheet,{
defval:"",
raw:false
});

/* feste Spalten */

const columns = [

{
title:Object.keys(json[0])[0],
field:Object.keys(json[0])[0],
cssClass:"statusCol",
hozAlign:"center",
frozen:true
},

{
title:Object.keys(json[0])[1],
field:Object.keys(json[0])[1],
frozen:true,

formatter:function(cell){

let value = cell.getValue();

if(!value) return "";

let url;

/* wenn echter Link vorhanden → direkt nutzen */
if(isURL(value)){

if(!value.startsWith("http"))
value = "https://" + value;

url = value;

}

/* sonst Facebook Suche */
else{

url =
"https://www.facebook.com/search/top?q="
+ encodeURIComponent(value);

}

return `<a href="${url}" target="_blank">${value}</a>`;

}

},

{
title:Object.keys(json[0])[2],
field:Object.keys(json[0])[2],
cssClass:"portalCol",
frozen:true,

cellClick:function(e,cell){

navigator.clipboard.writeText(cell.getValue());

}

}

];

/* restliche Spalten automatisch */

Object.keys(json[0]).slice(3).forEach(col=>{

columns.push({

title:col,
field:col

});

});

/* Tabelle */

if(!table){

table = new Tabulator("#table",{

data:json,

columns:columns,

layout:"fitDataStretch"

});

}

else{

table.replaceData(json);

}

});

}

loadData();

/* Suche */

document.getElementById("search").addEventListener("keyup",function(){

let value = this.value.toLowerCase();

table.setFilter(data =>

Object.values(data).some(v =>

String(v).toLowerCase().includes(value)

)

);

});

</script>

</body>

</html>
